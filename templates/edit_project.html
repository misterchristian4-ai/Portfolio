{% extends 'base.html' %}

{% block title %}Edit Project{% endblock %}

{% block content %}
<div class="login-wrapper"> 
    <div class="login-card" style="max-width: 550px;">
        <h1>Edit Project</h1>
        <p style="margin-bottom: 25px;">Modify the details below to update your portfolio project.</p>

        <form action="/edit/{{ project.id }}" method="POST" enctype="multipart/form-data" class="login-form">
            
            <div class="form-group">
                <label for="title">Project Title</label>
                <!-- FIXED: Removed the accidental comma and fixed syntax -->
                <input type="text" id="title" name="title" value="{{ project.title }}" placeholder="e.g., E-Commerce Platform" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <!-- FIXED: Moved Jinja variable between the textarea tags, and changed title to description -->
                <textarea id="description" name="description" placeholder="Describe your project..." required
                    style="background-color: var(--bg-color); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); padding: 12px 16px; font-size: 1rem; font-family: inherit; resize: vertical; min-height: 100px;">{{ project.description }}</textarea>
            </div>

            <div class="form-group">
                <label for="github">GitHub URL</label>
                <!-- FIXED: Added value attribute -->
                <input type="url" id="github" name="github" value="{{ project.github }}" placeholder="https://github.com/..." required>
            </div>

            <div class="form-group">
                <label for="demo">Live Demo URL</label>
                <!-- FIXED: Added value attribute -->
                <input type="url" id="demo" name="demo" value="{{ project.demo }}" placeholder="https://yourdemo.com">
            </div>

            <div class="form-group">
                <label for="image">Project Preview Image (Optional)</label>
                <!-- FIXED: Removed 'required' so you don't have to re-upload the file on every edit -->
                <input type="file" id="image" name="image" accept="image/*"
                    style="padding: 8px 0; border: none; background: transparent;">
                <small style="color: var(--text-secondary); text-align: left; font-size: 0.8rem; margin-top: -4px;">
                    Current image: {{ project.image }} (Leave blank to keep current image)
                </small>
            </div>

            <button type="submit" class="btn-login" style="margin-top: 15px;">Save Changes</button>
            
            <a href="/dashboard" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; margin-top: 10px; display: inline-block;">
                Cancel and Go Back
            </a>
        </form>
    </div>
</div>
{% endblock %}
