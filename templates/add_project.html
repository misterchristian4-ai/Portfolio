{% extends 'base.html' %}

{% block title %}Add New Project{% endblock %}

{% block content %}
<!-- Use the shared styling system from your login layout -->
<div class="login-wrapper"> 
    <div class="login-card" style="max-width: 550px;"> <!-- Made slightly wider for form inputs -->
        <h1>Add New Project</h1>
        <p style="margin-bottom: 25px;">Fill out the details below to publish a project to your portfolio website.</p>

        <!-- enctype="multipart/form-data" is CRITICAL for file/image uploads to work in Flask -->
        <form action="/add-project" method="POST" enctype="multipart/form-data" class="login-form">
            
            <div class="form-group">
                <label for="title">Project Title</label>
                <input type="text" id="title" name="title" placeholder="e.g., E-Commerce Platform" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <!-- Styled textarea to match your inputs -->
                <textarea id="description" name="description" placeholder="Describe your project..." required 
                    style="background-color: var(--bg-color); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); padding: 12px 16px; font-size: 1rem; font-family: inherit; resize: vertical; min-height: 100px;"></textarea>
            </div>

            <div class="form-group">
                <label for="github">GitHub URL</label>
                <input type="url" id="github" name="github" placeholder="https://github.com/..." required>
            </div>

            <div class="form-group">
                <label for="demo">Live Demo URL</label>
                <input type="url" id="demo" name="demo" placeholder="https://yourdemo.com">
            </div>

            <div class="form-group">
                <label for="image">Project Preview Image</label>
                <input type="file" id="image" name="image" accept="image/*" required
                    style="padding: 8px 0; border: none; background: transparent;">
            </div>

            <button type="submit" class="btn-login" style="margin-top: 15px;">Save & Publish Project</button>
            
            <a href="/dashboard" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; margin-top: 10px; display: inline-block;">
                Cancel and Go Back
            </a>
        </form>
    </div>
</div>
{% endblock %}
